<!-- Bottom Navigation Bar (Suppressed on this transactional/focused screen as per rules, but structurally required if it was a destination. Hiding it to follow "Task-Focused" suppression rule.) -->
<script>
        // Simulate search finding technicians after 3 seconds
        setTimeout(() => {
            const radarContainer = document.getElementById('radar-container');
            const techPins = document.getElementById('tech-pins');
            const bottomSlider = document.getElementById('bottom-slider');

            // Hide Radar
            radarContainer.classList.add('opacity-0');
            radarContainer.classList.add('transition-opacity', 'duration-500');
            setTimeout(() => radarContainer.style.display = 'none', 500);

            // Show Pins
            techPins.classList.remove('hidden');
            // small delay to allow display block to apply before opacity transition
            setTimeout(() => {
                techPins.classList.remove('opacity-0');
            }, 50);

            // Slide up bottom cards
            setTimeout(() => {
                bottomSlider.classList.remove('translate-y-full');
            }, 400);

        }, 3000);

        function selectTech(index) {
            // Simple interaction demo
            const sliderContainer = document.querySelector('.overflow-x-auto');
            const cards = document.querySelectorAll('.snap-center');
            if(cards[index]) {
                cards[index].scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
                
                // Highlight logic (visual feedback)
                cards.forEach((c, i) => {
                    if(i === index) {
                        c.classList.remove('bg-surface-container-high/50', 'opacity-70', 'border-outline-variant/20');
                        c.classList.add('bg-surface-container-high/90', 'glowing-border');
                    } else {
                        c.classList.add('bg-surface-container-high/50', 'opacity-70', 'border-outline-variant/20');
                        c.classList.remove('bg-surface-container-high/90', 'glowing-border');
                    }
                });
            }
        }
    </script>
