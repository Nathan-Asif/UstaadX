version: '3.9'

services:
  postgres:
    image: postgres:15-alpine
    container_name: ustaadx_postgres
    environment:
      POSTGRES_USER: ustaadx
      POSTGRES_PASSWORD: ustaadx_dev_password
      POSTGRES_DB: ustaadx_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ustaadx"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ustaadx_network

  redis:
    image: redis:7-alpine
    container_name: ustaadx_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - ustaadx_network

  backend:
    build:
      context: ./apps/backend_api
      dockerfile: Dockerfile
    container_name: ustaadx_backend
    environment:
      - DATABASE_URL=postgresql://ustaadx:ustaadx_dev_password@postgres:5432/ustaadx_db
      - REDIS_URL=redis://redis:6379/0
      - ENVIRONMENT=development
    ports:
      - "8000:8000"
    volumes:
      - ./apps/backend_api:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - ustaadx_network

  celery_worker:
    build:
      context: ./apps/backend_api
      dockerfile: Dockerfile
    container_name: ustaadx_celery_worker
    environment:
      - DATABASE_URL=postgresql://ustaadx:ustaadx_dev_password@postgres:5432/ustaadx_db
      - REDIS_URL=redis://redis:6379/0
      - ENVIRONMENT=development
    volumes:
      - ./apps/backend_api:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A app.core.celery_app worker --loglevel=info
    networks:
      - ustaadx_network

volumes:
  postgres_data:
  redis_data:

networks:
  ustaadx_network:
    driver: bridge
